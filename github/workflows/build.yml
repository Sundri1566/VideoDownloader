name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Unzip Project
      run: |
        unzip VideoDownloader_AndroidStudio.zip
        cd VideoDownloader
    
    - name: Grant execute permission
      run: chmod +x VideoDownloader/gradlew
    
    - name: Build Debug APK
      run: |
        cd VideoDownloader
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: VidSaver-Pro-APK
        path: VideoDownloader/app/build/outputs/apk/debug/app-debug.apk
